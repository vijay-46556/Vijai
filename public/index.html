<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#080810" />
    <meta name="description" content="Vij AI - Next-gen intelligence. No filters." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vij AI" />
    <link rel="manifest" href="/manifest.json" />
    <title>Vij AI</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #080810; overflow: hidden; }
      #splash { position: fixed; inset: 0; background: #080810; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
      #splash .logo { width: 80px; height: 80px; border-radius: 22px; background: linear-gradient(135deg, #00e5ff, #7b2fff); display: flex; align-items: center; justify-content: center; font-size: 38px; font-weight: 900; color: #fff; font-family: 'Segoe UI', sans-serif; box-shadow: 0 0 60px rgba(0,229,255,0.3); margin-bottom: 18px; }
      #splash h1 { font-family: 'Segoe UI', sans-serif; font-size: 28px; font-weight: 900; color: #e8eaf0; }
      #splash h1 span { color: #00e5ff; }
      #splash p { font-family: 'Segoe UI', sans-serif; color: #6b7280; font-size: 13px; margin-top: 8px; }
      #splash .dots { display: flex; gap: 8px; margin-top: 32px; }
      #splash .dot { width: 8px; height: 8px; border-radius: 50%; background: #00e5ff; animation: bounce 1.2s ease-in-out infinite; }
      #splash .dot:nth-child(2) { animation-delay: 0.2s; background: #7b2fff; }
      #splash .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes bounce { 0%, 100% { transform: scale(0.6); opacity: 0.4; } 50% { transform: scale(1); opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo">V</div>
      <h1>Vij<span>AI</span></h1>
      <p>Next-gen intelligence. No filters.</p>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 500); }
        }, 1800);
      });
    </script>
  </body>
</html>
